<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupportBot — CloudSync Support</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; color: #333; }
        h1 { border-bottom: 2px solid #2563eb; padding-bottom: 10px; }
        #chat-window { border: 1px solid #ddd; height: 400px; overflow-y: scroll; padding: 15px; margin-bottom: 20px; background: #fafafa; border-radius: 8px; }
        .message { margin-bottom: 12px; padding: 8px 12px; border-radius: 6px; }
        .user { background: #eff6ff; border-left: 4px solid #2563eb; }
        .bot { background: #f0fdf4; border-left: 4px solid #16a34a; }
        .role { font-weight: bold; display: block; margin-bottom: 4px; }
        .turn { font-size: 0.8em; color: #666; font-weight: normal; float: right; }
        #input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 4px; border: 1px solid #ddd; font-size: 16px; }
        button { padding: 10px 24px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>SupportBot Dashboard</h1>
    <div id="chat-window"></div>
    <div id="input-area">
        <input type="text" id="message-input" placeholder="Ask a question about CloudSync..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const sessionId = `web-session-${Date.now()}`;

        function addMessage(role, content, turn = null) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            
            const turnHtml = turn ? `<span class="turn">(Turn ${turn})</span>` : '';
            const roleName = role === 'user' ? 'You' : 'CloudSync AI';
            
            div.innerHTML = `<span class="role">${roleName}${turnHtml}</span> <span>${content}</span>`;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            messageInput.value = '';
            addMessage('user', text);
            sendBtn.disabled = true;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, sessionId })
                });

                const data = await response.json();
                if (data.reply) {
                    addMessage('bot', data.reply, data.turn);
                } else {
                    addMessage('bot', 'Error: ' + (data.error || 'Unknown error'));
                }
            } catch (err) {
                addMessage('bot', 'Failed to reach server. Please ensure the backend is running.');
            } finally {
                sendBtn.disabled = false;
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Initialize with greeting
        addMessage('bot', 'Welcome to CloudSync support. How can I help you today?');
    </script>
</body>
</html>
