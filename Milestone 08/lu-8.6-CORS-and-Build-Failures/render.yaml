# render.yaml — Render Blueprint for LinkShelf

services:
  # ---- Backend API ----
  - type: web
    name: linkshelf-api
    runtime: node
    region: oregon
    plan: free
    # ================================================================
    # BUG #3 FIXED: Automated Database Client & Schema Sync 
    # Appending Client Generation and Migration Deployment processes
    # into the deployment pipeline ensures that database schemas stay
    # locked and ready prior to application execution.
    # ================================================================
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: linkshelf-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # ================================================================
      # BUG #2 FIXED: Explicit CORS handshake configuration
      # Configures the backend to accept secure credential pipelines 
      # from your deployed static web asset domain interface.
      # ================================================================
      - key: CORS_ORIGIN
        value: https://your-frontend.onrender.com

  # ---- Frontend (Static Site) ----
  - type: web
    name: linkshelf-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_ENV
        value: production
      # ================================================================
      # BUG #2 FIXED: Build-time environment compilation
      # Bakes the explicit backend API target into the static artifact
      # production bundle during compilation execution.
      # ================================================================
      - key: VITE_API_URL
        value: https://your-backend.onrender.com/api
